services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: whatsapp-crm-app-prod
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - whatsapp-crm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  whatsapp-crm:
    driver: bridge
